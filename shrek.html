<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trailer Shrek Animado</title>
    <link rel="stylesheet" href="shrek.css">
</head>

<body>

    <div class="trailer">

        <div class="estrellas"></div>
        <div class="magia"></div>

        <div class="luna"></div>
        <div class="nube"></div>
        <div class="nube nube2"></div>

        <div class="castillo">
            <div class="torre torre1"></div>
            <div class="torre torre2"></div>
            <div class="torre torre3"></div>
            <div class="base-castillo"></div>
        </div>

        <div class="casa">
            <div class="techo"></div>
            <div class="ventana"></div>
            <div class="puerta"></div>
        </div>

        <div class="shrek">
            <div class="cabeza">
                <div class="oreja izq"></div>
                <div class="oreja der"></div>
                <div class="ojo izq"></div>
                <div class="ojo der"></div>
                <div class="sonrisa"></div>
            </div>

            <div class="cuerpo">
                <div class="chaleco"></div>
            </div>

            <div class="pierna izq"></div>
            <div class="pierna der"></div>
        </div>

        <div class="burro">
            <div class="burro-cuerpo"></div>
            <div class="burro-cabeza">
                <div class="burro-oreja izq"></div>
                <div class="burro-oreja der"></div>
                <div class="burro-ojo"></div>
            </div>
            <div class="burro-pata p1"></div>
            <div class="burro-pata p2"></div>
        </div>

        <div class="pantano"></div>
        <div class="agua"></div>
        <div class="pasto"></div>

        <div class="logo">SHREK</div>

        <div class="texto"></div>

    </div>

</body>
</html>
